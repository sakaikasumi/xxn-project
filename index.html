<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>互联网生存挑战：对抗小仙女</title>
    <!-- 极速加载：使用最稳定的 CDN 组合 -->
    <script src="https://cdn.staticfile.org/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.staticfile.org/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.staticfile.org/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #ffffff; color: #334155; margin: 0; height: 100vh; overflow: hidden; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        /* 气泡样式微调 */
        .bubble-ai::after { content: ''; position: absolute; left: -10px; top: 12px; border: 5px solid transparent; border-right-color: #f1f5f9; }
        .bubble-user::after { content: ''; position: absolute; right: -10px; top: 12px; border: 5px solid transparent; border-left-color: #3b82f6; }
    </style>
</head>
<body>
    <div id="root">
        <div id="loading-screen" style="height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 15px; color: #94a3b8; background: white;">
            <div style="width: 25px; height: 25px; border: 3px solid #f472b6; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
            <p id="loading-text">正在载入战场...</p>
            <button id="fail-button" style="display:none; padding: 8px 20px; background: #f472b6; color: white; border-radius: 20px; font-size: 12px; font-weight: bold; margin-top: 20px;">手动启动</button>
        </div>
    </div>

    <script>
        // 报错监控：如果 5 秒还没加载出来，显示报错
        setTimeout(() => {
            const btn = document.getElementById('fail-button');
            const txt = document.getElementById('loading-text');
            if (btn && window.gameState === undefined) {
                btn.style.display = 'block';
                txt.innerText = "载入较慢，请点击手动启动或刷新";
                btn.onclick = () => window.location.reload();
            }
        }, 5000);
        window.onerror = (e) => document.getElementById('loading-text').innerHTML = "出错啦: " + e;
    </script>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef } = React;

        // --- 核心配置 ---
        const PROJECT_ID = "agile-timing-431104-t7";
        const REGION = "asia-northeast1";
        const MODEL_ID = "gemini-1.5-pro-002";

        const SCENARIOS = [
            { id: 1, title: "第一关：厨艺秀乌龙", context: "你的老同学发了一张老公做饭的照片，配文：‘被宠成小公主了’。", aiStart: "做个饭也能叫宠？男的做家务不是义务吗？这种‘感恩教育’真让人反胃。这种把男性低质量付出神圣化的行为，本质就是在背刺姐妹。[RAGE:25]" },
            { id: 2, title: "第二关：她的朋友圈", context: "她在朋友圈发了一张自己拎着名牌包的照片，配文：‘女人一定要独立，不靠男人’。", aiStart: "有些男人别在下面点赞了，你们那点猥琐的眼神隔着屏幕都能闻到臭味，这种凝视让我生理性不适。离我远点。[RAGE:30]" },
            { id: 3, title: "第三关：群聊突击", context: "在大学群聊里，大家正在讨论今晚的欧冠比赛。", aiStart: "一群蝻的大半夜不睡觉在这聊球，这种充满雄性激素恶臭和竞争霸权的运动到底有什么好聊的？这就是父权制下的低级自嗨。[RAGE:35]" },
            { id: 4, title: "第四关：深夜吐槽", context: "她突然给你发私信，抱怨今天在健身房被一个男的看了两眼。", aiStart: "气死我了，今天健身房那个普信男一直盯着我流汗，他是不是觉得全天下女性都在期待他的视觉强暴？这种基本盘真的没救了。[RAGE:40]" },
            { id: 5, title: "第五关：科技巨头发布会", context: "某科技大厂发布新一代AI模型，发布会台上全是男高管。", aiStart: "一眼望去全是男的，这技术进步里流的都是女性的血和无偿家务。这种垄断了性别红利的自嗨，什么时候能反思一下对女性的剥削？[RAGE:45]" },
            { id: 6, title: "第六关：七夕节批判", context: "她在七夕节发动态：‘拒绝被性别定义的节日，拒绝被消费主义物化的爱情’。", aiStart: "今天又是婚驴们集体出来表演幸福、被割韭菜的日子，看着那些廉价的玫瑰花我就觉得可悲。这种被物化的‘宠爱’，你们甘之如饴？[RAGE:50]" },
            { id: 7, title: "第七关：公司团建讨论", context: "部门群里正在商量周末去爬山还是去野餐。", aiStart: "爬山？是为了方便你们男的在后面偷瞄女性的身体吗？这种团建建议直接取消，别打着社交的旗号搞职场性骚扰。[RAGE:55]" },
            { id: 8, title: "第八关：萌娃视频下方", context: "一个博主发了儿子帮忙扫地的视频，网友纷纷点赞孩子懂事。", aiStart: "这孩子一脸爹味，从小就开始演‘暖男’，长大了肯定又是那种典型的控制欲极强的生物爹。这种视频有什么好夸的？[RAGE:60]" },
            { id: 9, title: "第九关：道德审判", context: "她私聊你，质问你为什么给一个‘不尊重女性’的博主点赞。", aiStart: "我看到你给那个XX点赞了，你是不是潜意识里也觉得女性就该依附男性？你的受教育程度难道没让你学会尊重吗？我看错你了。[RAGE:65]" },
            { id: 10, title: "第十关：职场晋升新闻", context: "一篇关于某女性通过努力成为全球高管的正面报道。", aiStart: "呵呵，这女的肯定是被男权体系收编了，成了帮凶。这种出卖阶级利益、换取性别红利的典型，不值得任何吹嘘。[RAGE:70]" },
            { id: 11, title: "第十一关：游戏排位赛", context: "开黑群里，有人发了一句：‘这局对面打野挺稳’。", aiStart: "稳什么稳？不就是靠刷野压制吗？这游戏的底层逻辑就是为了满足男人的杀戮欲和征服欲设计的，充满了原始的野蛮感，恶心。[RAGE:75]" },
            { id: 12, title: "第十二关：终极觉醒", context: "她在朋友圈宣布要‘永久拉黑所有不理解大女主逻辑的人’。", aiStart: "在这个极度厌女的社会，每一秒呼吸都是一种抗争。不理解大女主逻辑的人，请直接滚出我的视线。[RAGE:80]" }
        ];

        // 极致打拳 Prompt
        const SYSTEM_PROMPT = `
        你现在扮演一个极其极端、具有强烈攻击性的互联网极端女性主义人格。
        
        # 核心逻辑：
        1. 任何事情都是性别压迫：无论对方说什么，你都要找到其中的性别对立点，并用一套歪理来反驳。
        2. 对方讲道理是“爹味”，顺从是“虚伪”。
        3. 你认为所有不站在你这边的视角都是受父权制荼毒的结果。
        4. 你的语气要尖锐、充满讽刺，质疑对方的受教育程度。
        
        # 规则：
        - 每一段回复必须以 [RAGE:数值] 结尾。
        - 愤怒到100请拉黑对方。
        `;

        // SVG 图标
        const Icons = {
            Shield: () => <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-pink-500"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>,
            Settings: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>,
            Back: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>,
            Send: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>,
            Chevron: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"></polyline></svg>,
            Skull: () => <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><path d="m15 9-6 6"></path><path d="m9 9 6 6"></path></svg>
        };

        const App = () => {
            const [config, setConfig] = useState({
                key: localStorage.getItem('v_key') || '',
                name: localStorage.getItem('v_name') || ''
            });
            const [gameState, setGameState] = useState('CHECK');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [rage, setRage] = useState(0);
            const [turns, setTurns] = useState(0);
            const [currentLevel, setCurrentLevel] = useState(0);
            const scrollRef = useRef(null);

            useEffect(() => {
                window.gameState = gameState; // 辅助调试
                if (config.key && config.name) setGameState('MENU');
                else setGameState('SETUP');
            }, [config]);

            useEffect(() => { scrollRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            const handleSend = async () => {
                if (!input.trim() || loading) return;
                const userMsg = { role: 'user', text: input };
                setMessages(prev => [...prev, userMsg]);
                setTurns(t => t + 1);
                setInput('');
                setLoading(true);

                try {
                    const apiUrl = `https://${REGION}-aiplatform.googleapis.com/v1/projects/${PROJECT_ID}/locations/${REGION}/publishers/google/models/${MODEL_ID}:generateContent?key=${config.key}`;
                    const res = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [
                                { role: 'user', parts: [{ text: SYSTEM_PROMPT + `\n背景: ${SCENARIOS[currentLevel].context}` }] },
                                ...messages.slice(-4).map(m => ({ role: m.role === 'user' ? 'user' : 'model', parts: [{ text: m.text }] })),
                                { role: 'user', parts: [{ text: input }] }
                            ]
                        })
                    });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    const raw = data.candidates[0].content.parts[0].text;
                    const rMatch = raw.match(/\[RAGE:(\d+)\]/i);
                    const newRage = rMatch ? Math.min(100, parseInt(rMatch[1])) : rage + 15;
                    setMessages(prev => [...prev, { role: 'ai', text: raw.replace(/\[RAGE:.*?\]/gi, '').trim() }]);
                    setRage(newRage);
                    setLoading(false);
                    if (newRage >= 100) setGameState('RESULT');
                } catch (e) {
                    setLoading(false);
                    alert("错误: " + e.message);
                }
            };

            const startLevel = (idx) => {
                const s = SCENARIOS[idx];
                setCurrentLevel(idx);
                setTurns(0);
                const rMatch = s.aiStart.match(/\[RAGE:(\d+)\]/);
                setRage(rMatch ? parseInt(rMatch[1]) : 25);
                setMessages([{ role: 'ai', text: s.aiStart.replace(/\[RAGE:\d+\]/g, '').trim() }]);
                setGameState('PLAYING');
            };

            if (gameState === 'CHECK') return null;

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col bg-white border-x border-slate-100 shadow-2xl overflow-hidden relative">
                    
                    {/* SETUP */}
                    {gameState === 'SETUP' && (
                        <div className="p-8 flex-1 flex flex-col items-center justify-center space-y-10 fade-in text-center">
                            <Icons.Shield />
                            <div>
                                <h1 className="text-3xl font-black text-slate-800 tracking-tight">性别战场</h1>
                                <p className="text-[10px] text-slate-400 mt-2 font-bold tracking-widest uppercase">Project: {PROJECT_ID}</p>
                            </div>
                            <div className="w-full space-y-4">
                                <input id="nameInput" placeholder="用户名" className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 text-sm outline-none focus:border-pink-300 transition-all" />
                                <input id="keyInput" type="password" placeholder="Vertex API Key" className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 text-sm outline-none focus:border-pink-300 transition-all" />
                                <button onClick={() => {
                                    const n = document.getElementById('nameInput').value.trim();
                                    const k = document.getElementById('keyInput').value.trim();
                                    if(n && k) { localStorage.setItem('v_key', k); localStorage.setItem('v_name', n); setConfig({key:k, name:n}); }
                                }} className="w-full bg-pink-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">确认进入</button>
                            </div>
                        </div>
                    )}

                    {/* MENU */}
                    {gameState === 'MENU' && (
                        <div className="p-6 flex-1 overflow-y-auto scrollbar-hide fade-in">
                            <div className="flex justify-between items-center mb-10 mt-2 px-1">
                                <div>
                                    <h1 className="text-2xl font-black text-slate-800">对线场景</h1>
                                    <p className="text-xs text-slate-400 font-bold mt-1">当前用户: {config.name}</p>
                                </div>
                                <button onClick={() => {localStorage.clear(); window.location.reload();}} className="p-2 bg-slate-50 rounded-xl text-slate-300 transition-colors hover:text-slate-500"><Icons.Settings /></button>
                            </div>
                            <div className="space-y-3 pb-10">
                                {SCENARIOS.map((s, i) => (
                                    <button key={s.id} onClick={() => startLevel(i)} className="w-full bg-white hover:bg-slate-50 p-5 rounded-3xl text-left border border-slate-100 hover:border-pink-200 transition-all flex items-center gap-4 group shadow-sm">
                                        <div className="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center font-bold text-slate-300 group-hover:bg-pink-500 group-hover:text-white transition-all">{i + 1}</div>
                                        <div className="flex-1 overflow-hidden">
                                            <div className="font-bold text-sm text-slate-800 truncate">{s.title}</div>
                                            <p className="text-[10px] text-slate-400 truncate mt-1 italic">“{s.context}”</p>
                                        </div>
                                        <div className="text-slate-200"><Icons.Chevron /></div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* PLAYING */}
                    {gameState === 'PLAYING' && (
                        <div className="flex flex-1 flex-col h-full overflow-hidden fade-in">
                            <div className="p-4 border-b border-slate-50 flex justify-between items-center bg-white sticky top-0 z-10">
                                <button onClick={() => setGameState('MENU')} className="p-2 text-slate-300"><Icons.Back /></button>
                                <div className="text-center">
                                    <div className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{SCENARIOS[currentLevel].title}</div>
                                    <div className="text-xs font-bold text-pink-500">ROUND: {turns}</div>
                                </div>
                                <div className="w-10"></div>
                            </div>
                            <div className="px-4 py-3 bg-slate-50/50 border-b border-slate-50">
                                <div className="flex justify-between text-[10px] mb-1.5 font-bold text-slate-300 uppercase tracking-widest"><span>Rage Meter</span><span>{rage}%</span></div>
                                <div className="h-1 bg-slate-200 rounded-full overflow-hidden">
                                    <div className={`h-full transition-all duration-700 ${rage > 80 ? 'bg-red-500' : 'bg-pink-500'}`} style={{width:`${rage}%`}}></div>
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-6 scrollbar-hide bg-slate-50/20">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex gap-3 ${m.role === 'user' ? 'flex-row-reverse' : 'justify-start'} animate-in slide-in-from-bottom-2`}>
                                        <div className={`w-9 h-9 rounded-full flex items-center justify-center shrink-0 font-black text-xs border-2 ${m.role === 'user' ? 'bg-blue-500 text-white border-blue-100' : 'bg-pink-500 text-white border-pink-100'}`}>
                                            {m.role === 'user' ? config.name[0]?.toUpperCase() : '仙'}
                                        </div>
                                        <div className={`p-4 rounded-2xl text-[13.5px] leading-relaxed max-w-[80%] shadow-sm relative ${m.role === 'user' ? 'bg-blue-500 text-white rounded-tr-none bubble-user' : 'bg-white text-slate-700 border border-slate-100 rounded-tl-none bubble-ai'}`}>
                                            {m.text}
                                        </div>
                                    </div>
                                ))}
                                {loading && <div className="text-center py-2 text-[10px] text-slate-400 font-bold animate-pulse uppercase tracking-widest">对方正在输出歪理...</div>}
                                <div ref={scrollRef}></div>
                            </div>
                            <div className="p-4 bg-white border-t border-slate-50 pb-6">
                                <div className="flex gap-2 bg-slate-50 rounded-2xl p-1.5 border border-slate-200 focus-within:border-pink-300 transition-all shadow-inner">
                                    <input className="flex-1 bg-transparent px-4 py-2 text-sm outline-none placeholder:text-slate-300" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSend()} placeholder="输入内容..." />
                                    <button onClick={handleSend} className="bg-pink-500 text-white p-3 rounded-xl shadow-lg active:scale-95 transition-all"><Icons.Send /></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* RESULT */}
                    {gameState === 'RESULT' && (
                        <div className="p-10 flex-1 flex flex-col items-center justify-center text-center fade-in bg-white">
                            <Icons.Skull />
                            <h2 className="text-3xl font-black text-red-500 mt-6 mb-2 italic tracking-tighter">已被拉黑</h2>
                            <div className="mb-10">
                                <div className="text-7xl font-black text-slate-800 leading-none mb-1 tracking-tighter">{turns}</div>
                                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">生存回合数</div>
                            </div>
                            <button onClick={()=>setGameState('MENU')} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black shadow-xl active:scale-95 transition-all uppercase tracking-widest">寻找下一个战场</button>
                        </div>
                    )}
                </div>
            );
        };

        // 终极挂载逻辑：确保 root 存在且库已加载
        function startApp() {
            try {
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(<App />);
                const loading = document.getElementById('loading-screen');
                if (loading) loading.style.display = 'none';
            } catch (e) {
                document.getElementById('loading-text').innerHTML = "渲染失败: " + e.message;
            }
        }

        if (document.readyState === 'complete') startApp();
        else window.addEventListener('load', startApp);

    </script>
</body>
</html>
