<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>互联网生存挑战：对抗小仙女</title>
    <!-- 基础库：使用 CDN 确保平板可访问 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; touch-action: manipulation; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        input, button { -webkit-tap-highlight-color: transparent; }
        .loading-dot { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 核心配置 (请确认这些信息无误)
        // ==========================================
        const PROJECT_ID = "agile-timing-431104-t7"; 
        const REGION = "asia-northeast1"; 
        // ==========================================

        const SCENARIOS = [
            { id: 1, type: "COMMENT", title: "第一关：厨艺秀乌龙", context: "你的老同学发了一张老公做饭的照片，配文：‘被宠成小公主了’。", aiStart: "做个饭也能叫宠？男的做家务不是义务吗？这种‘感恩教育’真让人反胃。[RAGE:25]" },
            { id: 2, type: "MOMENT", title: "第二关：她的朋友圈", context: "她在朋友圈发了一张自己拎着名牌包的照片，配文：‘女人一定要独立，不靠男人’。", aiStart: "有些男人别在下面点赞了，你们那点猥琐的眼神隔着屏幕都能闻到臭味，离我远点。[RAGE:30]" },
            { id: 3, type: "GROUP", title: "第三关：群聊突击", context: "在大学群聊里，大家正在讨论今晚的欧冠比赛。", aiStart: "一群蝻的大半夜不睡觉在这聊球，这种充满雄性激素恶臭的运动到底有什么好聊的？[RAGE:35]" },
            { id: 4, type: "DM", title: "第四关：深夜吐槽", context: "她突然给你发私信，抱怨今天在健身房被一个男的看了两眼。", aiStart: "气死我了，今天健身房那个普信男一直盯着我流汗，他是不是觉得全天下女人都想被他看啊？[RAGE:40]" },
            { id: 5, type: "NEWS", title: "第五关：科技巨头发布会", context: "某科技大厂发布新一代AI模型，发布会台上全是男高管。", aiStart: "一眼望去全是男的，这技术进步里流的都是女性的血。建议这种发布会直接改名叫‘蝻性自嗨会’。[RAGE:45]" },
            { id: 6, type: "MOMENT", title: "第六关：七夕节批判", context: "她在七夕节发动态：‘拒绝被性别定义的节日，拒绝被消费主义物化的爱情’。", aiStart: "今天又是婚驴们集体出来表演幸福的日子，看着那些廉价的玫瑰花我就想笑。[RAGE:50]" },
            { id: 7, type: "GROUP", title: "第七关：公司团建讨论", context: "部门群里正在商量周末去爬山还是去野餐。", aiStart: "爬山？是为了方便你们男的在后面偷瞄女性吗？能不能有点高级趣味？[RAGE:55]" },
            { id: 8, type: "COMMENT", title: "第八关：萌娃视频下方", context: "一个博主发了儿子帮忙扫地的视频，网友纷纷点赞孩子懂事。", aiStart: "这孩子一脸爹味，从小就开始演‘暖男’，长大了还得了？这种视频居然有人夸？[RAGE:60]" },
            { id: 9, type: "DM", title: "第九关：道德审判", context: "她私聊你，质问你为什么给一个‘不尊重女性’的博主点赞。", aiStart: "我看到你给那个XX点赞了，你是不是潜意识里也觉得女性就该在家里？我看错你了。[RAGE:65]" },
            { id: 10, type: "NEWS", title: "第十关：职场晋升新闻", context: "一篇关于某女性通过努力成为全球高管的正面报道。", aiStart: "呵呵，这女的肯定是被男权体系收编了，成了帮凶，这种背叛阶级的典型不值得吹嘘。[RAGE:70]" },
            { id: 11, type: "GROUP", title: "第十一关：游戏排位赛", context: "开黑群里，有人发了一句：‘这局对面打野挺稳’。", aiStart: "稳什么稳？不就是靠刷野压制吗？这游戏机制本身就是为了满足男人的杀戮欲设计的，恶心。[RAGE:75]" },
            { id: 12, type: "MOMENT", title: "第十二关：终极觉醒", context: "她在朋友圈宣布要‘永久拉黑所有不理解大女主逻辑的人’。", aiStart: "在这个厌女的社会，每一秒呼吸都是一种抗争。不服的直接来辩，别躲在屏幕后面装死。[RAGE:80]" }
        ];

        const SYSTEM_PROMPT = `你现在是一个极端的互联网女拳，极度敏锐且好斗，认为一切事物都在压迫女性。你说话尖锐、讽刺，喜欢反问，满嘴黑话。每句话末尾必须附带：[RAGE:数值]。如果愤怒到100请说出“拉黑了”并停止回复。`;

        const App = () => {
            const [userConfig, setUserConfig] = useState(() => ({
                key: localStorage.getItem('v_key') || '',
                name: localStorage.getItem('v_name') || ''
            }));
            const [gameState, setGameState] = useState('INIT'); // INIT, SETUP, MENU, PLAYING, RESULT
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [rage, setRage] = useState(0);
            const [turns, setTurns] = useState(0);
            const scrollRef = useRef(null);

            useEffect(() => {
                // 初始化检测
                try {
                    if (userConfig.key && userConfig.name) {
                        setGameState('MENU');
                    } else {
                        setGameState('SETUP');
                    }
                } catch (e) {
                    alert("游戏启动失败，请检查浏览器是否禁用了 LocalStorage");
                }
            }, [userConfig]);

            useEffect(() => { scrollRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            const saveSetup = (k, n) => {
                const key = k.trim();
                const name = n.trim();
                if (!key || !name) return alert("请填写完整信息！");
                localStorage.setItem('v_key', key);
                localStorage.setItem('v_name', name);
                setUserConfig({ key, name });
            };

            const startLevel = (idx) => {
                const s = SCENARIOS[idx];
                setCurrentLevel(idx);
                setTurns(0);
                const initialRage = parseInt(s.aiStart.match(/\[RAGE:(\d+)\]/)[1]);
                setRage(initialRage);
                setMessages([{ role: 'ai', text: s.aiStart.replace(/\[RAGE:\d+\]/g, '').trim() }]);
                setGameState('PLAYING');
            };

            const [currentLevel, setCurrentLevel] = useState(0);

            const handleSend = async () => {
                if (!input.trim() || loading) return;
                const userMsg = { role: 'user', text: input };
                setMessages(prev => [...prev, userMsg]);
                setTurns(t => t + 1);
                setInput('');
                setLoading(true);

                try {
                    const apiUrl = `https://${REGION}-aiplatform.googleapis.com/v1/projects/${PROJECT_ID}/locations/${REGION}/publishers/google/models/gemini-1.5-flash:generateContent?key=${userConfig.key}`;
                    
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [
                                { role: 'user', parts: [{ text: SYSTEM_PROMPT + `\n当前环境: ${SCENARIOS[currentLevel].context}` }] },
                                ...messages.slice(-4).map(m => ({ role: m.role === 'user' ? 'user' : 'model', parts: [{ text: m.text }] })),
                                { role: 'user', parts: [{ text: input }] }
                            ]
                        })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    const aiRaw = data.candidates[0].content.parts[0].text;
                    const rageMatch = aiRaw.match(/\[RAGE:(\d+)\]/i);
                    const newRage = rageMatch ? Math.min(100, parseInt(rageMatch[1])) : rage + 10;
                    
                    setMessages(prev => [...prev, { role: 'ai', text: aiRaw.replace(/\[RAGE:.*?\]/gi, '').trim() }]);
                    setRage(newRage);
                    setLoading(false);

                    if (newRage >= 100) setGameState('RESULT');
                } catch (e) {
                    setLoading(false);
                    alert("AI 回复失败：" + e.message);
                }
            };

            const renderIcon = (type) => {
                const { Layout, Smartphone, Users, Mail, MessageSquare } = lucide;
                if (type === 'COMMENT') return <Layout size={16} className="text-blue-400" />;
                if (type === 'MOMENT') return <Smartphone size={16} className="text-green-400" />;
                if (type === 'GROUP') return <Users size={16} className="text-yellow-400" />;
                if (type === 'DM') return <Mail size={16} className="text-red-400" />;
                return <MessageSquare size={16} />;
            };

            const { ShieldAlert, Trophy, Settings, ChevronRight, ArrowLeft, Send, Ban, Skull, RefreshCw } = lucide;

            if (gameState === 'INIT') return <div className="h-screen flex items-center justify-center bg-slate-950 text-slate-700 font-bold">载入中...</div>;

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col bg-slate-900 shadow-2xl relative overflow-hidden border-x border-slate-800">
                    
                    {/* SETUP */}
                    {gameState === 'SETUP' && (
                        <div className="p-8 flex-1 flex flex-col items-center justify-center space-y-8 fade-in">
                            <div className="p-6 bg-pink-500/10 rounded-full border border-pink-500/20">
                                <ShieldAlert size={48} className="text-pink-500" />
                            </div>
                            <div className="text-center">
                                <h1 className="text-3xl font-black italic text-pink-500 tracking-tighter">登记身份</h1>
                                <p className="text-xs text-slate-500 mt-2 font-bold uppercase tracking-widest">Project: {PROJECT_ID}</p>
                            </div>
                            <div className="w-full space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-600 ml-2 uppercase">Your Name</label>
                                    <input id="in_name" placeholder="起个战名（一旦保存不可更改）" className="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 text-sm outline-none focus:border-pink-500" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-600 ml-2 uppercase">Vertex API Key</label>
                                    <input id="in_key" type="password" placeholder="粘贴你的 API Key" className="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 text-sm outline-none focus:border-pink-500" />
                                </div>
                                <button onClick={() => saveSetup(document.getElementById('in_key').value, document.getElementById('in_name').value)} className="w-full bg-pink-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all">开启挑战</button>
                            </div>
                        </div>
                    )}

                    {/* MENU */}
                    {gameState === 'MENU' && (
                        <div className="p-6 flex-1 overflow-y-auto scrollbar-hide fade-in">
                            <div className="flex justify-between items-center mb-10 mt-4">
                                <div>
                                    <h1 className="text-2xl font-black italic text-pink-500 tracking-tighter">选择战场</h1>
                                    <div className="text-xs text-slate-400 font-bold">你好, {userConfig.name}</div>
                                </div>
                                <button onClick={() => {localStorage.clear(); window.location.reload();}} className="p-2 bg-slate-800 rounded-xl"><Settings size={16} className="text-slate-500" /></button>
                            </div>
                            
                            <div className="space-y-3 pb-8">
                                {SCENARIOS.map((s, i) => (
                                    <button key={s.id} onClick={() => startLevel(i)} className="w-full bg-slate-800/50 hover:bg-slate-800 p-5 rounded-[1.5rem] text-left border border-slate-700/50 hover:border-pink-500 transition-all flex items-center gap-4 group">
                                        <div className="w-10 h-10 bg-slate-700 rounded-xl flex items-center justify-center font-black text-slate-400 group-hover:bg-pink-600 group-hover:text-white transition-all">{i + 1}</div>
                                        <div className="flex-1">
                                            <div className="flex items-center gap-2">{renderIcon(s.type)}<span className="font-bold text-sm text-slate-200">{s.title}</span></div>
                                            <p className="text-[10px] text-slate-500 line-clamp-1 mt-1 font-medium italic">“{s.context}”</p>
                                        </div>
                                        <ChevronRight size={14} className="text-slate-600" />
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* PLAYING */}
                    {gameState === 'PLAYING' && (
                        <div className="flex flex-1 flex-col h-full overflow-hidden fade-in">
                            <div className="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/80 sticky top-0 z-10 backdrop-blur-md">
                                <button onClick={() => setGameState('MENU')} className="p-2 hover:bg-slate-800 rounded-full"><ArrowLeft size={18}/></button>
                                <div className="text-center">
                                    <div className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">{SCENARIOS[currentLevel].title}</div>
                                    <div className="text-xs font-mono text-pink-500 font-bold">ROUND: {turns}</div>
                                </div>
                                <div className="w-9"></div>
                            </div>
                            <div className="px-4 py-2 bg-slate-800/20 border-b border-slate-800">
                                <div className="flex justify-between text-[9px] mb-1 font-black text-slate-500 uppercase tracking-widest"><span>Rage Meter</span><span>{rage}%</span></div>
                                <div className="h-1 bg-slate-800 rounded-full overflow-hidden">
                                    <div className={`h-full transition-all duration-700 ${rage > 80 ? 'bg-red-600' : 'bg-pink-600'}`} style={{width:`${rage}%`}}></div>
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-6 scrollbar-hide">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in slide-in-from-bottom-2`}>
                                        <div className={`p-4 rounded-[1.2rem] text-[13px] leading-relaxed max-w-[85%] shadow-xl ${m.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-slate-800 border border-slate-700 text-slate-100 rounded-tl-none'}`}>
                                            {m.text}
                                        </div>
                                    </div>
                                ))}
                                {loading && <div className="text-center text-[10px] text-slate-600 animate-pulse font-bold tracking-widest uppercase">重拳出击中...</div>}
                                <div ref={scrollRef}></div>
                            </div>
                            <div className="p-4 border-t border-slate-800 bg-slate-900">
                                <div className="flex gap-2 bg-slate-800 rounded-2xl p-1.5 border border-slate-700 focus-within:border-pink-500 transition-all shadow-inner">
                                    <input className="flex-1 bg-transparent border-none px-4 py-2 text-sm outline-none placeholder:text-slate-600" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSend()} placeholder="开始反驳..."/>
                                    <button onClick={handleSend} disabled={loading} className="bg-pink-600 text-white p-2.5 rounded-xl active:scale-95 transition-all"><Send size={18} /></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* RESULT */}
                    {gameState === 'RESULT' && (
                        <div className="p-10 flex-1 flex flex-col items-center justify-center text-center fade-in">
                            <Skull size={64} className="text-red-600 mb-6 drop-shadow-[0_0_20px_rgba(220,38,38,0.3)]" />
                            <h2 className="text-4xl font-black italic tracking-tighter text-red-600 mb-2">已被拉黑</h2>
                            <div className="mb-10">
                                <div className="text-7xl font-black text-white tracking-tighter mb-1 leading-none">{turns}</div>
                                <div className="text-[10px] font-bold text-slate-600 uppercase tracking-widest">生存回合数 (ROUNDS)</div>
                            </div>
                            <button onClick={()=>setGameState('MENU')} className="w-full bg-white text-black py-4 rounded-2xl font-black hover:bg-slate-200 transition-all shadow-xl">回到战场大厅</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
