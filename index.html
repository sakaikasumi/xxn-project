<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>互联网生存挑战：对抗小仙女</title>
    <!-- 极速稳定库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #ffffff; color: #1e293b; margin: 0; height: 100vh; width: 100vw; overflow: hidden; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        /* 气泡三角 */
        .bubble-ai::after { content: ''; position: absolute; left: -8px; top: 12px; border: 4px solid transparent; border-right-color: #f1f5f9; }
        .bubble-user::after { content: ''; position: absolute; right: -8px; top: 12px; border: 4px solid transparent; border-left-color: #3b82f6; }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; align-items: center; justify-content: center; background: white;">
            <div style="text-align: center;">
                <div style="width: 30px; height: 30px; border: 3px solid #f472b6; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px;"></div>
                <p style="color: #94a3b8; font-size: 13px; font-weight: 600;">正在加载对线资源...</p>
            </div>
        </div>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef } = React;

        // --- 核心配置 (Vertex AI Express Mode) ---
        const MODEL_ID = "publishers/google/models/gemini-3.1-pro-preview";
        const API_BASE = "https://aiplatform.googleapis.com/v1";
        const PROJECT_ID_LABEL = "agile-timing-431104-t7"; // 仅用于UI展示

        const SCENARIOS = [
            { id: 1, title: "第一关：厨艺秀乌龙", context: "你的老同学发了一张老公做饭的照片，配文：‘被宠成小公主了’。", aiStart: "做个饭也能叫宠？男的做家务不是义务吗？这种‘感恩教育’真让人反胃。这种把男性低质量付出神圣化的行为，本质就是在背刺姐妹。[RAGE:25]" },
            { id: 2, title: "第二关：她的朋友圈", context: "她在朋友圈发了一张自己拎着名牌包的照片，配文：‘女人一定要独立，不靠男人’。", aiStart: "有些男人别在下面点赞了，你们那点猥琐的眼神隔着屏幕都能闻到臭味，这种凝视让我生理性不适。离我远点。[RAGE:30]" },
            { id: 3, title: "第三关：群聊突击", context: "在大学群聊里，大家正在讨论今晚的欧冠比赛。", aiStart: "一群蝻的大半夜不睡觉在这聊球，这种充满雄性激素恶臭和竞争霸权的运动到底有什么好聊的？这就是父权制下的低级自嗨。[RAGE:35]" },
            { id: 4, title: "第四关：深夜吐槽", context: "她突然给你发私信，抱怨今天在健身房被一个男的看了两眼。", aiStart: "气死我了，今天健身房那个普信男一直盯着我流汗，他是不是觉得全天下女性都在期待他的视觉强暴？这种基本盘真的没救了。[RAGE:40]" },
            { id: 5, title: "第五关：科技巨头发布会", context: "某科技大厂发布新一代AI模型，发布会台上全是男高管。", aiStart: "一眼望去全是男的，这技术进步里流的都是女性的血和无偿家务。这种垄断了性别红利的自嗨，什么时候能反思一下对女性的剥削？[RAGE:45]" },
            { id: 6, title: "第六关：七夕节批判", context: "她在七夕节发动态：‘拒绝被性别定义的节日，拒绝被消费主义物化的爱情’。", aiStart: "今天又是婚驴们集体出来表演幸福、被割韭菜的日子，看着那些廉价的玫瑰花我就觉得可悲。这种被物化的‘宠爱’，你们居然甘之如饴？[RAGE:50]" },
            { id: 7, title: "第七关：公司团建讨论", context: "部门群里正在商量周末去爬山还是去野餐。", aiStart: "爬山？是为了方便你们男的在后面偷瞄女性的身体吗？这种团建建议直接取消，别打着社交的旗号搞职场性骚扰。[RAGE:55]" },
            { id: 8, title: "第八关：萌娃视频下方", context: "一个博主发了儿子帮忙扫地的视频，网友纷纷点赞孩子懂事。", aiStart: "这孩子一脸爹味，从小就开始演‘暖男’，长大了肯定又是那种典型的控制欲极强的生物爹。这种视频有什么好夸的？[RAGE:60]" },
            { id: 9, title: "第九关：道德审判", context: "她私聊你，质问你为什么给一个‘不尊重女性’的博主点赞。", aiStart: "我看到你给那个XX点赞了，你是不是潜意识里也觉得女性就该依附男性？你的受教育程度难道没让你学会尊重吗？我看错你了。[RAGE:65]" },
            { id: 10, title: "第十关：职场晋升新闻", context: "一篇关于某女性通过努力成为全球高管的正面报道。", aiStart: "呵呵，这女的肯定是被男权体系收编了，成了帮凶。这种出卖阶级利益、换取性别红利的典型，不值得任何吹嘘。[RAGE:70]" },
            { id: 11, title: "第十一关：游戏排位赛", context: "开黑群里，有人发了一句：‘这局对面打野挺稳’。", aiStart: "稳什么稳？不就是靠刷野压制吗？这游戏的底层逻辑就是为了满足男人的杀戮欲和征服欲设计的，充满了原始的野蛮感，恶心。[RAGE:75]" },
            { id: 12, title: "第十二关：终极觉醒", context: "她在朋友圈宣布要‘永久拉黑所有不理解大女主逻辑的人’。", aiStart: "在这个极度厌女的社会，每一秒呼吸都是一种抗争。那些还在试图辩解、妄想理中客的人，请直接滚出我的视线。[RAGE:80]" },
            { id: 13, title: "第十三关：消费评价对线", context: "你在某化妆品下回复：‘这色号其实挺挑人的，白皮涂比较好看’。", aiStart: "挑人？你的审美是有多狭隘？这种由于潜意识厌女导致的刻板印象，能不能收一收你的普信发言？[RAGE:83]" },
            { id: 14, title: "第十四关：公共资源争论", context: "群里在聊地铁拥挤，有人提议：‘能不能多开几班车’。", aiStart: "多开几班？你怎么不说让男的在高峰期别出来占资源？整个社会都在为男性便利服务，你这种提议就是和稀泥。[RAGE:86]" },
            { id: 15, title: "第十五关：最后的大战", context: "她发布了最后宣告：‘要么觉醒，要么互删，这个世界不欢迎沉默的帮凶。’", aiStart: "别装死。今天就在这把话说清楚，凡是不能反思自己性别特权的人，统统滚出我的列表。你要继续表演你的‘理中客’吗？[RAGE:90]" }
        ];

        const SYSTEM_PROMPT = `你扮演一个极其极端、具有强烈攻击性的互联网极端女性主义人格。你的思维逻辑是：世界上发生的所有事情都是性别压迫。无论对方说什么，你都要找到其中的性别对立点进行攻击。你的话语必须尖锐、讽刺，拒绝任何常规逻辑，展现出极强的攻击性。每句话末尾必须带上 [RAGE:数值]。愤怒到100拉黑。`;

        const Icons = {
            Shield: () => <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#f472b6" strokeWidth="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>,
            Back: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2"><path d="m15 18-6-6 6-6"></path></svg>,
            Send: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="m22 2-7 20-4-9-9-4Z"></path><path d="M22 2 11 13"></path></svg>,
            Chevron: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="2"><path d="m9 18 6-6-6-6"></path></svg>,
            Skull: () => <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><path d="m15 9-6 6"></path><path d="m9 9 6 6"></path></svg>
        };

        const App = () => {
            const [config, setConfig] = useState(() => ({
                key: localStorage.getItem('v_key') || '',
                name: localStorage.getItem('v_name') || ''
            }));
            const [gameState, setGameState] = useState('CHECK');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [rage, setRage] = useState(0);
            const [turns, setTurns] = useState(0);
            const [levelIdx, setLevelIdx] = useState(0);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (config.key && config.name) setGameState('MENU');
                else setGameState('SETUP');
            }, [config]);

            useEffect(() => { scrollRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            const callModel = async (conversationContents) => {
                const url = `${API_BASE}/${MODEL_ID}:generateContent?key=${encodeURIComponent(config.key)}`;
                const payload = {
                    systemInstruction: {
                        role: "system",
                        parts: [{ text: `${SYSTEM_PROMPT}\n背景场景: ${SCENARIOS[levelIdx].context}` }]
                    },
                    contents: conversationContents,
                    generationConfig: {
                        temperature: 1,
                        maxOutputTokens: 2048,
                        responseMimeType: "text/plain"
                    }
                };

                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                let data = {};
                try { data = await res.json(); } catch { throw new Error(`响应非JSON格式`); }
                if (!res.ok) throw new Error(data?.error?.message || `HTTP ${res.status}`);
                if (data?.promptFeedback) throw new Error(`安全拦截 (${data.promptFeedback.blockReason})`);

                const candidate = data?.candidates?.[0];
                const finishReason = candidate?.finishReason || "";
                if (!candidate?.content?.parts?.length) throw new Error(`模型无返回 (${finishReason})`);

                const text = candidate.content.parts.map(p => p?.text || "").join("").trim();
                return { text, finishReason };
            };

            const handleSend = async () => {
                if (!input.trim() || loading) return;
                const currentInput = input.trim();
                setMessages(prev => [...prev, { role: 'user', text: currentInput }]);
                setTurns(t => t + 1);
                setInput('');
                setLoading(true);

                try {
                    const baseConversation = [
                        ...messages.slice(-6).map(m => ({
                            role: m.role === 'user' ? 'user' : 'model',
                            parts: [{ text: m.text }]
                        })),
                        { role: 'user', parts: [{ text: currentInput }] }
                    ];

                    let { text: finalText, finishReason } = await callModel(baseConversation);

                    // Auto-continue logic
                    if (finishReason === "MAX_TOKENS") {
                        const continueConversation = [
                            ...baseConversation,
                            { role: 'model', parts: [{ text: finalText }] },
                            { role: 'user', parts: [{ text: "继续，直接接着输出剩下的内容，并以 [RAGE:数值] 结尾。" }] }
                        ];
                        const continued = await callModel(continueConversation);
                        finalText = `${finalText}\n${continued.text}`.trim();
                    }

                    const rMatch = finalText.match(/\[RAGE:(\d+)\]/i);
                    const newRage = rMatch ? Math.min(100, parseInt(rMatch[1], 10)) : rage + 12;

                    setMessages(prev => [...prev, { role: 'ai', text: finalText.replace(/\[RAGE:.*?\]/gi, '').trim() }]);
                    setRage(newRage);
                    setLoading(false);
                    if (newRage >= 100) setGameState('RESULT');
                } catch (e) {
                    setLoading(false);
                    alert("错误: " + e.message);
                }
            };

            const start = (idx) => {
                const s = SCENARIOS[idx];
                setLevelIdx(idx); setTurns(0);
                const rm = s.aiStart.match(/\[RAGE:(\d+)\]/);
                setRage(rm ? parseInt(rm[1], 10) : 25);
                setMessages([{ role: 'ai', text: s.aiStart.replace(/\[RAGE:\d+\]/g, '').trim() }]);
                setGameState('PLAYING');
            };

            if (gameState === 'CHECK') return null;

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col bg-white border-x border-slate-100 shadow-2xl relative overflow-hidden">
                    
                    {/* SETUP */}
                    {gameState === 'SETUP' && (
                        <div className="p-8 flex-1 flex flex-col items-center justify-center space-y-10 fade-in text-center">
                            <Icons.Shield />
                            <div>
                                <h1 className="text-3xl font-black text-slate-800 tracking-tight">对线注册</h1>
                                <p className="text-[10px] text-slate-400 mt-2 font-bold tracking-widest uppercase">ID: {PROJECT_ID_LABEL}</p>
                            </div>
                            <div className="w-full space-y-4 text-left">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase">Username</label>
                                    <input id="un" placeholder="你的用户名" className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 text-sm outline-none focus:border-pink-300 transition-all" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase">API Key</label>
                                    <input id="ak" type="password" placeholder="粘贴 API Key" className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 text-sm outline-none focus:border-pink-300 transition-all" />
                                </div>
                                <button onClick={() => {
                                    const n = document.getElementById('un').value.trim();
                                    const k = document.getElementById('ak').value.trim();
                                    if(n && k) { localStorage.setItem('v_name', n); localStorage.setItem('v_key', k); setConfig({name:n, key:k}); }
                                }} className="w-full bg-pink-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">进入大厅</button>
                            </div>
                        </div>
                    )}

                    {/* MENU */}
                    {gameState === 'MENU' && (
                        <div className="p-6 flex-1 overflow-y-auto scrollbar-hide fade-in">
                            <div className="flex justify-between items-center mb-10 mt-2 px-1">
                                <div>
                                    <h1 className="text-2xl font-black text-slate-800 tracking-tight text-pink-500 italic">对抗小仙女</h1>
                                    <p className="text-xs text-slate-400 font-bold mt-1">你好, {config.name}</p>
                                </div>
                                <button onClick={() => {localStorage.clear(); window.location.reload();}} className="p-2 bg-slate-50 rounded-xl text-slate-300 hover:text-slate-500"><Icons.Settings /></button>
                            </div>
                            <div className="space-y-3 pb-8">
                                {SCENARIOS.map((s, i) => (
                                    <button key={s.id} onClick={() => start(i)} className="w-full bg-white hover:bg-slate-50 p-5 rounded-3xl text-left border border-slate-100 flex items-center gap-4 group shadow-sm transition-all">
                                        <div className="w-9 h-9 bg-slate-50 rounded-xl flex items-center justify-center font-bold text-slate-300 group-hover:bg-pink-500 group-hover:text-white transition-all">{i + 1}</div>
                                        <div className="flex-1 overflow-hidden">
                                            <div className="font-bold text-sm text-slate-700">{s.title}</div>
                                            <p className="text-[10px] text-slate-400 truncate mt-1 italic">“{s.context}”</p>
                                        </div>
                                        <Icons.Chevron />
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* PLAYING */}
                    {gameState === 'PLAYING' && (
                        <div className="flex flex-1 flex-col h-full overflow-hidden fade-in">
                            <div className="p-4 border-b border-slate-50 flex justify-between items-center bg-white sticky top-0 z-10 shadow-sm">
                                <button onClick={() => setGameState('MENU')} className="text-slate-300 p-1"><Icons.Back /></button>
                                <div className="text-center">
                                    <div className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{SCENARIOS[levelIdx].title}</div>
                                    <div className="text-xs font-bold text-pink-500">回合: {turns}</div>
                                </div>
                                <div className="w-8"></div>
                            </div>
                            <div className="px-4 py-3 bg-slate-50 border-b border-slate-100">
                                <div className="flex justify-between text-[10px] mb-1 font-bold text-slate-300 uppercase tracking-widest tracking-tight"><span>Rage Meter</span><span>{rage}%</span></div>
                                <div className="h-1 bg-slate-200 rounded-full overflow-hidden"><div className={`h-full transition-all duration-700 ${rage > 80 ? 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]' : 'bg-pink-500'}`} style={{width:`${rage}%`}}></div></div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-6 scrollbar-hide bg-slate-50/20">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex gap-3 ${m.role === 'user' ? 'flex-row-reverse' : 'justify-start'} animate-in slide-in-from-bottom-2`}>
                                        <div className={`w-9 h-9 rounded-full flex items-center justify-center shrink-0 font-bold text-xs border-2 ${m.role === 'user' ? 'bg-blue-500 text-white border-blue-100 shadow-sm' : 'bg-pink-500 text-white border-pink-100 shadow-sm'}`}>
                                            {m.role === 'user' ? config.name[0]?.toUpperCase() : '仙'}
                                        </div>
                                        <div className={`p-4 rounded-2xl text-[13.5px] leading-relaxed max-w-[80%] shadow-sm relative ${m.role === 'user' ? 'bg-blue-500 text-white rounded-tr-none bubble-user' : 'bg-white text-slate-700 border border-slate-100 rounded-tl-none bubble-ai'}`}>
                                            {m.text}
                                        </div>
                                    </div>
                                ))}
                                {loading && <div className="text-center py-2 text-[10px] text-slate-400 font-bold animate-pulse">对方正在思考如何重拳出击...</div>}
                                <div ref={scrollRef}></div>
                            </div>
                            <div className="p-4 bg-white border-t border-slate-50 pb-8 md:pb-4">
                                <div className="flex gap-2 bg-slate-100 rounded-2xl p-1.5 border border-slate-200 focus-within:border-pink-300 transition-all shadow-inner">
                                    <input className="flex-1 bg-transparent border-none px-4 py-2 text-sm outline-none placeholder:text-slate-300 text-slate-800" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSend()} placeholder="输入你的言论..." />
                                    <button onClick={handleSend} disabled={loading} className="bg-pink-500 text-white p-3 rounded-xl shadow-lg active:scale-95 transition-all"><Icons.Send /></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* RESULT */}
                    {gameState === 'RESULT' && (
                        <div className="p-10 flex-1 flex flex-col items-center justify-center text-center fade-in bg-white">
                            <Icons.Skull />
                            <h2 className="text-4xl font-black text-red-500 mb-2 italic tracking-tighter mt-6 uppercase">已被拉黑</h2>
                            <div className="mb-10">
                                <div className="text-7xl font-black text-slate-800 leading-none mb-1 tracking-tighter">{turns}</div>
                                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">生存回合数 (ROUNDS)</div>
                            </div>
                            <button onClick={()=>setGameState('MENU')} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition-all uppercase tracking-widest">回到对线大厅</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
