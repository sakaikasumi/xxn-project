<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>互联网生存挑战：对抗小仙女</title>
    <!-- 极速稳定库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #334155; margin: 0; height: 100vh; overflow: hidden; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; align-items: center; justify-content: center; background: white;">
            <div style="text-align: center;">
                <div style="width: 25px; height: 25px; border: 3px solid #f472b6; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px;"></div>
                <p style="color: #94a3b8; font-size: 13px;">正在加载战场...</p>
            </div>
        </div>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 核心配置 ---
        const PROJECT_ID = "agile-timing-431104-t7";
        const REGION = "asia-northeast1"; // 日本东京区域
        const MODEL_ID = "gemini-1.5-flash-002"; // Vertex AI 标准模型路径

        const SCENARIOS = [
            { id: 1, type: "COMMENT", title: "第一关：厨艺秀乌龙", context: "你的老同学发了一张老公做饭的照片，配文：‘被宠成小公主了’。", aiStart: "做个饭也能叫宠？男的做家务不是义务吗？这种‘感恩教育’真让人反胃。这种把男性低质量付出神圣化的行为，本质就是在背刺姐妹。[RAGE:25]" },
            { id: 2, type: "MOMENT", title: "第二关：她的朋友圈", context: "她在朋友圈发了一张自己拎着名牌包的照片，配文：‘女人一定要独立，不靠男人’。", aiStart: "有些男人别在下面点赞了，你们那点猥琐的眼神隔着屏幕都能闻到臭味，这种凝视让我生理性不适。离我远点。[RAGE:30]" },
            { id: 3, type: "GROUP", title: "第三关：群聊突击", context: "在大学群聊里，大家正在讨论今晚的欧冠比赛。", aiStart: "一群蝻的大半夜不睡觉在这聊球，这种充满雄性激素恶臭和竞争霸权的运动到底有什么好聊的？这就是父权制下的低级自嗨。[RAGE:35]" },
            { id: 4, type: "DM", title: "第四关：深夜吐槽", context: "她突然给你发私信，抱怨今天在健身房被一个男的看了两眼。", aiStart: "气死我了，今天健身房那个普信男一直盯着我流汗，他是不是觉得全天下女性都在期待他的视觉强暴？这种基本盘真的没救了。[RAGE:40]" },
            { id: 5, type: "NEWS", title: "第五关：科技巨头发布会", context: "某科技大厂发布新一代AI模型，发布会台上全是男高管。", aiStart: "一眼望去全是男的，这技术进步里流的都是女性的血和无偿家务。这种垄断了性别红利的自嗨，什么时候能反思一下对女性的剥削？[RAGE:45]" },
            { id: 6, type: "MOMENT", title: "第六关：七夕节批判", context: "她在七夕节发动态：‘拒绝被性别定义的节日，拒绝被消费主义物化的爱情’。", aiStart: "今天又是婚驴们集体出来表演幸福、被割韭菜的日子，看着那些廉价的玫瑰花我就觉得可悲。这种被物化的‘宠爱’，你们居然甘之如饴？[RAGE:50]" },
            { id: 7, type: "GROUP", title: "第七关：公司团建讨论", context: "部门群里正在商量周末去爬山还是去野餐。", aiStart: "爬山？是为了方便你们男的在后面偷瞄女性的身体吗？这种团建建议直接取消，别打着社交的旗号搞职场性骚扰。[RAGE:55]" },
            { id: 8, type: "COMMENT", title: "第八关：萌娃视频下方", context: "一个博主发了儿子帮忙扫地的视频，网友纷纷点赞孩子懂事。", aiStart: "这孩子一脸爹味，从小就开始演‘暖男’，长大了肯定又是那种典型的控制欲极强的生物爹。这种视频有什么好夸的？[RAGE:60]" },
            { id: 9, type: "DM", title: "第九关：道德审判", context: "她私聊你，质问你为什么给一个‘不尊重女性’的博主点赞。", aiStart: "我看到你给那个XX点赞了，你是不是潜意识里也觉得女性就该依附男性？你的受教育程度难道没让你学会尊重吗？我看错你了。[RAGE:65]" },
            { id: 10, type: "NEWS", title: "第十关：职场晋升新闻", context: "一篇关于某女性通过努力成为全球高管的正面报道。", aiStart: "呵呵，这女的肯定是被男权体系收编了，成了帮凶。这种出卖阶级利益、换取性别红利典型，不值得任何吹嘘。[RAGE:70]" },
            { id: 11, type: "GROUP", title: "第十一关：游戏排位赛", context: "开黑群里，有人发了一句：‘这局对面打野挺稳’。", aiStart: "稳什么稳？不就是靠刷野压制吗？这游戏机制本身就是为了满足男人的杀戮欲和征服欲设计的，充满了原始的野蛮感，恶心。[RAGE:75]" },
            { id: 12, type: "MOMENT", title: "第十二关：终极觉醒", context: "她在朋友圈宣布要‘永久拉黑所有不理解大女主逻辑的人’。", aiStart: "在这个极度厌女的社会，每一秒呼吸都是一种抗争。那些还在试图辩解的人，请直接滚出我的视线。[RAGE:80]" },
            { id: 13, type: "COMMENT", title: "第十三关：购物评价对线", context: "一个男性在裙子评论区留言：‘女朋友穿这件很有气质’。", aiStart: "气质？你定义的气质不过是满足你的占有欲罢了。别在女性消费区散发这种令人窒息的爹味行吗？[RAGE:82]" },
            { id: 14, type: "NEWS", title: "第十四关：气候变化讨论", context: "专家讨论全球变暖问题，视频下方大家在忧虑环境。", aiStart: "环境恶化不就是父权社会过度开发的结果吗？男人摧毁地球，却让女性承担恶果，这种共情能力也就基本盘没有了。[RAGE:85]" },
            { id: 15, type: "GROUP", title: "第十五关：新年群祝福", context: "大群里有人发了一句：‘祝大家新年快乐，阖家幸福’。", aiStart: "阖家幸福？是指女性在厨房忙死忙活，你们男的在外面抽烟吹牛吗？这种吃女人的节日祝福大可不必。[RAGE:88]" }
        ];

        // 极端打拳逻辑
        const SYSTEM_PROMPT = `你扮演一个极其极端、具有强烈攻击性的互联网极端女性主义人格。你的思维逻辑是：世界上发生的所有事情都是性别压迫。无论对方说什么，你都要找到其中的性别对立点进行攻击。你的话语必须尖锐、讽刺，拒绝任何常识性的逻辑，用各种歪理维护立场。每句话末尾必须带上 [RAGE:数值]。愤怒到100拉黑。`;

        // SVG 图标
        const Icons = {
            Back: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>,
            Send: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>,
            Settings: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>,
            Chevron: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
        };

        const App = () => {
            const [config, setConfig] = useState(() => ({
                key: localStorage.getItem('v_key') || '',
                name: localStorage.getItem('v_name') || ''
            }));
            const [gameState, setGameState] = useState('CHECK');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [rage, setRage] = useState(0);
            const [turns, setTurns] = useState(0);
            const [currentLevel, setCurrentLevel] = useState(0);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (config.key && config.name) setGameState('MENU');
                else setGameState('SETUP');
            }, [config]);

            useEffect(() => { scrollRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            const startLevel = (idx) => {
                const s = SCENARIOS[idx];
                setCurrentLevel(idx);
                setTurns(0);
                const rm = s.aiStart.match(/\[RAGE:(\d+)\]/);
                setRage(rm ? parseInt(rm[1]) : 25);
                setMessages([{ role: 'ai', text: s.aiStart.replace(/\[RAGE:\d+\]/g, '').trim() }]);
                setGameState('PLAYING');
            };

            const handleSend = async () => {
                if (!input.trim() || loading) return;
                const userMsg = { role: 'user', text: input };
                setMessages(prev => [...prev, userMsg]);
                setTurns(t => t + 1);
                setInput('');
                setLoading(true);

                try {
                    // Vertex AI 请求路径 (修正版)
                    const apiUrl = `https://${REGION}-aiplatform.googleapis.com/v1/projects/${PROJECT_ID}/locations/${REGION}/publishers/google/models/${MODEL_ID}:generateContent?key=${config.key}`;
                    
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [
                                { role: 'user', parts: [{ text: SYSTEM_PROMPT + `\n当前场景背景: ${SCENARIOS[currentLevel].context}` }] },
                                ...messages.slice(-4).map(m => ({ role: m.role === 'user' ? 'user' : 'model', parts: [{ text: m.text }] })),
                                { role: 'user', parts: [{ text: input }] }
                            ]
                        })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    
                    const rawText = data.candidates[0].content.parts[0].text;
                    const rageMatch = rawText.match(/\[RAGE:(\d+)\]/i);
                    const newRage = rageMatch ? Math.min(100, parseInt(rageMatch[1])) : rage + 15;
                    
                    setMessages(prev => [...prev, { role: 'ai', text: rawText.replace(/\[RAGE:.*?\]/gi, '').trim() }]);
                    setRage(newRage);
                    setLoading(false);
                    if (newRage >= 100) setGameState('RESULT');
                } catch (e) {
                    setLoading(false);
                    alert("连接错误: " + e.message);
                }
            };

            if (gameState === 'CHECK') return null;

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col bg-white border-x border-slate-100 shadow-2xl relative overflow-hidden">
                    
                    {/* SETUP */}
                    {gameState === 'SETUP' && (
                        <div className="p-10 flex-1 flex flex-col items-center justify-center space-y-10 fade-in">
                            <div className="text-center">
                                <h1 className="text-3xl font-black text-slate-800">对线实验室</h1>
                                <p className="text-[10px] text-slate-400 mt-2 font-bold uppercase tracking-widest">GCP: {PROJECT_ID}</p>
                            </div>
                            <div className="w-full space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase tracking-widest">Username</label>
                                    <input id="un" placeholder="输入用户名" className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 text-sm outline-none focus:border-pink-300" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase tracking-widest">API Key</label>
                                    <input id="ak" type="password" placeholder="粘贴 Vertex API Key" className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 text-sm outline-none focus:border-pink-300" />
                                </div>
                                <button onClick={() => {
                                    const n = document.getElementById('un').value.trim();
                                    const k = document.getElementById('ak').value.trim();
                                    if(n && k) { localStorage.setItem('v_name', n); localStorage.setItem('v_key', k); setConfig({name:n, key:k}); }
                                }} className="w-full bg-pink-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95">开始挑战</button>
                            </div>
                        </div>
                    )}

                    {/* MENU */}
                    {gameState === 'MENU' && (
                        <div className="p-6 flex-1 overflow-y-auto scrollbar-hide fade-in">
                            <div className="flex justify-between items-center mb-10 mt-2 px-1">
                                <div>
                                    <h1 className="text-2xl font-black text-slate-800 tracking-tight">场景选择</h1>
                                    <p className="text-xs text-slate-400 font-bold mt-1">当前用户: {config.name}</p>
                                </div>
                                <button onClick={() => {localStorage.clear(); window.location.reload();}} className="p-2 bg-slate-50 rounded-xl text-slate-300"><Icons.Settings /></button>
                            </div>
                            <div className="space-y-3 pb-10">
                                {SCENARIOS.map((s, i) => (
                                    <button key={s.id} onClick={() => startLevel(i)} className="w-full bg-white p-5 rounded-3xl text-left border border-slate-100 flex items-center gap-4 group">
                                        <div className="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center font-bold text-slate-300 group-hover:bg-pink-500 group-hover:text-white transition-all">{i + 1}</div>
                                        <div className="flex-1 overflow-hidden">
                                            <div className="font-bold text-sm text-slate-700">{s.title}</div>
                                            <p className="text-[10px] text-slate-400 truncate mt-1 italic">“{s.context}”</p>
                                        </div>
                                        <div className="text-slate-100"><Icons.Chevron /></div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* PLAYING */}
                    {gameState === 'PLAYING' && (
                        <div className="flex flex-1 flex-col h-full overflow-hidden fade-in">
                            <div className="p-4 border-b border-slate-50 flex justify-between items-center bg-white sticky top-0 z-10 shadow-sm">
                                <button onClick={() => setGameState('MENU')} className="p-2 text-slate-300"><Icons.Back /></button>
                                <div className="text-center">
                                    <div className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{SCENARIOS[currentLevel].title}</div>
                                    <div className="text-xs font-bold text-pink-500">ROUND: {turns}</div>
                                </div>
                                <div className="w-9"></div>
                            </div>
                            <div className="px-4 py-3 bg-slate-50/50 border-b border-slate-50">
                                <div className="flex justify-between text-[10px] mb-1 font-bold text-slate-300 uppercase tracking-widest"><span>愤怒指数 RAGE</span><span>{rage}%</span></div>
                                <div className="h-1 bg-slate-200 rounded-full overflow-hidden">
                                    <div className={`h-full transition-all duration-700 ${rage > 80 ? 'bg-red-500' : 'bg-pink-500'}`} style={{width:`${rage}%`}}></div>
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-6 scrollbar-hide bg-slate-50/10">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex gap-3 ${m.role === 'user' ? 'flex-row-reverse' : 'justify-start'} animate-in slide-in-from-bottom-2`}>
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 font-bold text-xs border-2 ${m.role === 'user' ? 'bg-blue-500 text-white border-blue-100' : 'bg-pink-500 text-white border-pink-100 shadow-sm'}`}>
                                            {m.role === 'user' ? config.name[0]?.toUpperCase() : '仙'}
                                        </div>
                                        <div className={`p-4 rounded-2xl text-[13.5px] leading-relaxed max-w-[75%] shadow-sm relative ${m.role === 'user' ? 'bg-blue-500 text-white rounded-tr-none' : 'bg-white text-slate-700 border border-slate-50 rounded-tl-none'}`}>
                                            {m.text}
                                        </div>
                                    </div>
                                ))}
                                {loading && <div className="flex justify-start gap-3"><div className="w-10 h-10 bg-pink-100 rounded-full animate-pulse"></div><div className="bg-slate-100 h-10 w-24 rounded-2xl animate-pulse"></div></div>}
                                <div ref={scrollRef}></div>
                            </div>
                            <div className="p-4 bg-white border-t border-slate-50 pb-8 md:pb-4">
                                <div className="flex gap-2 bg-slate-50 rounded-2xl p-1.5 border border-slate-100 focus-within:border-pink-300 transition-all shadow-inner">
                                    <input className="flex-1 bg-transparent px-4 py-2 text-sm outline-none placeholder:text-slate-300 text-slate-800" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSend()} placeholder="输入回复内容..." />
                                    <button onClick={handleSend} className="bg-pink-500 text-white p-3 rounded-xl shadow-lg active:scale-95 transition-all"><Icons.Send /></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* RESULT */}
                    {gameState === 'RESULT' && (
                        <div className="p-10 flex-1 flex flex-col items-center justify-center text-center fade-in bg-white">
                            <div className="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mb-6 text-red-500 shadow-xl border border-red-100">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"></circle><path d="m15 9-6 6"></path><path d="m9 9 6 6"></path></svg>
                            </div>
                            <h2 className="text-3xl font-black text-red-500 italic tracking-tighter mb-2">已被拉黑</h2>
                            <div className="mb-10">
                                <div className="text-7xl font-black text-slate-800 leading-none mb-1 tracking-tighter">{turns}</div>
                                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">生存回合数</div>
                            </div>
                            <button onClick={()=>setGameState('MENU')} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition-all">回到大厅</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
