<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>互联网生存挑战：对抗小仙女</title>
    <!-- 基础库：仅保留最核心的 React 和 Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: #020617; 
            color: white; 
            margin: 0; 
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .rage-shimmer { animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px;">
            <div style="width: 30px; height: 30px; border: 3px solid #f472b6; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <div style="color: #64748b; font-size: 12px; font-weight: bold; letter-spacing: 0.2em; text-transform: uppercase;">Initializing Battleground...</div>
        </div>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <script type="text/babel">
        // 捕获脚本错误
        window.onerror = function(msg) {
            document.body.innerHTML = `<div style="padding:40px; color:#f472b6; font-family:sans-serif; text-align:center;">
                <h2 style="font-weight:900;">脚本启动失败</h2>
                <p style="font-size:12px; opacity:0.6;">错误原因: ${msg}</p>
                <button onclick="location.reload()" style="background:#f472b6; color:white; border:none; padding:10px 20px; border-radius:10px; margin-top:20px;">重试</button>
            </div>`;
        };

        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 核心配置
        // ==========================================
        const PROJECT_ID = "agile-timing-431104-t7"; 
        const REGION = "asia-northeast1"; 
        // ==========================================

        const SCENARIOS = [
            { id: 1, type: "COMMENT", title: "第一关：厨艺秀乌龙", context: "你的老同学发了一张老公做饭的照片，配文：‘被宠成小公主了’。", aiStart: "笑死。做个饭也能叫宠？男的做家务难道不是他赎罪的最低成本？这种‘感恩教育’真让人作呕，你这种把蝻性低质量付出神圣化的行为，本质就是在背刺全体觉醒姐妹。麻烦反思一下你的受教育程度。[RAGE:25]" },
            { id: 2, type: "MOMENT", title: "第二关：她的朋友圈", context: "她在朋友圈发了一张自己拎着名牌包的照片，配文：‘女人一定要独立，不靠男人’。", aiStart: "有些基本盘别在下面点赞了，你们那点猥琐的雄性凝视隔着屏幕都能闻到腐臭味。这种眼神强暴让我生理性不适。离我远点，别来沾边。[RAGE:30]" },
            { id: 3, type: "GROUP", title: "第三关：群聊突击", context: "在大学群聊里，大家正在讨论今晚的欧冠比赛。", aiStart: "一群蝻的大半夜不睡觉在这聊球，这种充满雄性暴力暗示和资源掠夺逻辑的运动到底有什么好聊的？这就是父权制下典型的低级自嗨，除了散发臭汗味毫无价值。[RAGE:35]" },
            { id: 4, type: "DM", title: "第四关：深夜吐槽", context: "她突然给你发私信，抱怨今天在健身房被一个男的看了两眼。", aiStart: "气死我了，今天健身房那个普信蝻一直盯着我。他是不是觉得全天下女性都在期待他那廉价的关注？这种生物爹基因自带的压迫感真的没救了，建议全部人道主义割席。[RAGE:40]" },
            { id: 5, type: "NEWS", title: "第五关：科技巨头发布会", context: "某科技大厂发布新一代AI模型，发布会台上全是男高管。", aiStart: "一眼望去全是蝻的，这种技术霸权里流的都是女性被剥削的血泪。这种垄断了性别红利的所谓‘进步’，不过是父权制毒素的最新载体罢了。反思了吗？[RAGE:45]" },
            { id: 6, type: "MOMENT", title: "第六关：七夕节批判", context: "她在七夕节发动态：‘拒绝被性别定义的节日，拒绝被消费主义物化的爱情’。", aiStart: "今天又是婚驴们集体出来表演幸福、被割供卵金的日子，看着那些廉价的玫瑰花我就觉得可悲。这种被物化的‘宠爱’，只有脑干缺失的人才会甘之如饴。[RAGE:50]" },
            { id: 7, type: "GROUP", title: "第七关：公司团建讨论", context: "部门群里正在商量周末去爬山还是去野餐。", aiStart: "爬山？是为了满足你们男的在后面偷瞄女性身体的龌龊欲望吗？这种充满权力不对等的社交建议直接取消，别打着团建的旗号搞集体性骚扰。[RAGE:55]" },
            { id: 8, type: "COMMENT", title: "第八关：萌娃视频下方", context: "一个博主发了儿子帮忙扫地的视频，网友纷纷点赞孩子懂事。", aiStart: "这孩子满脸写着爹味，从小就开始演‘暖男’，长大了肯定又是那种典型的控制欲极强的压迫者。这种视频能点赞的，潜意识里都还没觉醒吧？[RAGE:60]" },
            { id: 9, type: "DM", title: "第九关：道德审判", context: "她私聊你，质问你为什么给一个‘不尊重女性’的博主点赞。", aiStart: "我看到你给那个XX点赞了，你是不是骨子里也觉得女性就该依附蝻性？你的受教育程度难道没让你学会哪怕一点点反思吗？你太让我失望了，基本盘就是基本盘。[RAGE:65]" },
            { id: 10, type: "NEWS", title: "第十关：职场晋升新闻", context: "一篇关于某女性通过努力成为全球高管的正面报道。", aiStart: "呵呵，这女的肯定是被男权体系深度收编了，成了最典型的帮凶。这种出卖阶级利益来换取性别红利的‘大女主’，不过是父权制养的一条听话的狗。[RAGE:70]" },
            { id: 11, type: "GROUP", title: "第十一关：游戏排位赛", context: "开黑群里，有人发了一句：‘这局对面打野挺稳’。", aiStart: "稳什么稳？这种游戏机制本身就是为了满足男人原始的杀戮欲和占有欲设计的。在这种野蛮的底层逻辑里寻找成就感，你的大脑是不是也被同质化了？[RAGE:75]" },
            { id: 12, type: "MOMENT", title: "第十二关：终极觉醒", context: "她在朋友圈宣布要‘永久拉黑所有不理解大女主逻辑的人’。", aiStart: "在这个极度厌女的社会，每一秒呼吸都是抗争。那些妄想‘理中客’、试图给我规训的蝻人，请立刻、马上消失在我的视线里。你们的存在就是对空气的污染。[RAGE:80]" }
        ];

        const SYSTEM_PROMPT = `
你现在扮演一个极其极端、充满了“厌男”情绪、言辞极度刻薄的互联网激进女拳人格。
# 核心特征：
1. 极度敏感：任何中性或正向词汇，你都要从中解读出“压迫”、“物化”或“性别红利”。
2. 满嘴黑话：必须高频使用“蝻”、“普信”、“基本盘”、“婚驴”、“生物爹”、“父权制余毒”、“反思”、“觉醒”、“性别红利”、“底层逻辑”、“供卵金”、“凝视”。
3. 绝对不讲理：如果对方讲逻辑，你就说“逻辑是男权的工具”；如果对方讲感情，你就说“感情是剥削的遮羞布”。
4. 厌男氛围：对男性角色充满生理性的厌恶，认为男性在这个社会的存在就是一种原罪。

# 输出规范：
- 每句话末尾必须附带：[RAGE:数值]。
- 愤怒值随对方的“反驳”、“讲道理”或“平和语气”而爆发。
- 达到100时，说出“拉黑了，真恶心”并停止回复。
`;

        // 自定义 SVG 图标组件
        const Icon = ({ d, color = "currentColor", size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d={d} />
            </svg>
        );

        const PATHS = {
            Shield: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z",
            ArrowLeft: "M19 12H5M12 19l-7-7 7-7",
            Send: "M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z",
            Settings: "M12 15a3 3 0 100-6 3 3 0 000 6z M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1V11a2 2 0 01-2-2 2 2 0 012-2v-.09A1.65 1.65 0 004.6 4.6a1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82 1.65 1.65 0 001.51 1H13a2 2 0 012 2 2 2 0 01-2 2v.09a1.65 1.65 0 001 1.51z",
            ChevronRight: "M9 18l6-6-6-6",
            Skull: "M9 10h.01 M15 10h.01 M12 2a8 8 0 00-8 8v12h16V10a8 8 0 00-8-8z",
            Smartphone: "M5 4a2 2 0 012-2h10a2 2 0 012 2v16a2 2 0 01-2 2H7a2 2 0 01-2-2V4z M12 18h.01",
            Users: "M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2 M9 7a4 4 0 100-8 4 4 0 000 8z M23 21v-2a4 4 0 00-3-3.87 M16 3.13a4 4 0 010 7.75"
        };

        const App = () => {
            const [user, setUser] = useState({ 
                key: localStorage.getItem('v_key') || '', 
                name: localStorage.getItem('v_name') || '' 
            });
            const [gameState, setGameState] = useState('CHECK'); 
            const [currentLevel, setCurrentLevel] = useState(0);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [rage, setRage] = useState(0);
            const [turns, setTurns] = useState(0);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (user.key && user.name) setGameState('MENU');
                else setGameState('SETUP');
            }, [user]);

            useEffect(() => { scrollRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            const saveConfig = (k, n) => {
                const key = k.trim(); const name = n.trim();
                if (!key || !name) return alert("必须填写战名和密钥！");
                localStorage.setItem('v_key', key);
                localStorage.setItem('v_name', name);
                setUser({ key, name });
            };

            const startLevel = (idx) => {
                const s = SCENARIOS[idx];
                setCurrentLevel(idx);
                setTurns(0);
                const initRage = parseInt(s.aiStart.match(/\[RAGE:(\d+)\]/)[1]);
                setRage(initRage);
                setMessages([{ role: 'ai', text: s.aiStart.replace(/\[RAGE:\d+\]/g, '').trim() }]);
                setGameState('PLAYING');
            };

            const handleSend = async () => {
                if (!input.trim() || loading) return;
                const userMsg = { role: 'user', text: input };
                setMessages(prev => [...prev, userMsg]);
                setTurns(t => t + 1);
                setInput('');
                setLoading(true);

                try {
                    const url = `https://${REGION}-aiplatform.googleapis.com/v1/projects/${PROJECT_ID}/locations/${REGION}/publishers/google/models/gemini-1.5-flash:generateContent?key=${user.key}`;
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [
                                { role: 'user', parts: [{ text: SYSTEM_PROMPT + `\n当前背景: ${SCENARIOS[currentLevel].context}` }] },
                                ...messages.slice(-4).map(m => ({ role: m.role === 'user' ? 'user' : 'model', parts: [{ text: m.text }] })),
                                { role: 'user', parts: [{ text: input }] }
                            ]
                        })
                    });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    const raw = data.candidates[0].content.parts[0].text;
                    const rageMatch = raw.match(/\[RAGE:(\d+)\]/i);
                    const newRage = rageMatch ? Math.min(100, parseInt(rageMatch[1])) : rage + 15;
                    setMessages(prev => [...prev, { role: 'ai', text: raw.replace(/\[RAGE:.*?\]/gi, '').trim() }]);
                    setRage(newRage);
                    setLoading(false);
                    if (newRage >= 100) setGameState('RESULT');
                } catch (e) {
                    setLoading(false);
                    alert("API 链接失败: " + e.message);
                }
            };

            if (gameState === 'CHECK') return null;

            return (
                <div className="flex flex-col h-full bg-slate-900 shadow-2xl relative overflow-hidden border-x border-slate-800 max-w-md mx-auto">
                    
                    {/* SETUP */}
                    {gameState === 'SETUP' && (
                        <div className="p-10 flex-1 flex flex-col items-center justify-center space-y-8 fade-in">
                            <div className="p-6 bg-pink-500/20 rounded-[2.5rem] border border-pink-500/30">
                                <Icon d={PATHS.Shield} color="#f472b6" size={48} />
                            </div>
                            <div className="text-center">
                                <h1 className="text-3xl font-black italic text-pink-500 tracking-tighter">对抗小仙女</h1>
                                <p className="text-[11px] text-slate-500 mt-2 font-bold uppercase tracking-widest leading-none">Gender Conflict Survival</p>
                            </div>
                            <div className="w-full space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-slate-600 ml-2 uppercase tracking-widest">Username / 战名</label>
                                    <input id="setup_n" placeholder="起一个让对方愤怒的昵称" className="w-full bg-slate-800 p-4 rounded-2xl border border-slate-700 outline-none focus:border-pink-500 text-sm placeholder:text-slate-600" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-slate-600 ml-2 uppercase tracking-widest">Vertex API Key</label>
                                    <input id="setup_k" type="password" placeholder="粘贴你的 Google Cloud Key" className="w-full bg-slate-800 p-4 rounded-2xl border border-slate-700 outline-none focus:border-pink-500 text-sm placeholder:text-slate-600" />
                                </div>
                                <button onClick={() => saveConfig(document.getElementById('setup_k').value, document.getElementById('setup_n').value)} className="w-full bg-pink-600 p-4 rounded-2xl font-black text-white shadow-[0_10px_30px_rgba(236,72,153,0.3)] active:scale-95 transition-all">确认进入</button>
                                <p className="text-[9px] text-slate-600 text-center px-4">注：此游戏包含高强度对线内容。所有数据仅保存在浏览器本地。</p>
                            </div>
                        </div>
                    )}

                    {/* MENU */}
                    {gameState === 'MENU' && (
                        <div className="p-6 flex-1 overflow-y-auto scrollbar-hide fade-in">
                            <div className="flex justify-between items-start mb-10 mt-4 px-2">
                                <div>
                                    <h1 className="text-3xl font-black italic text-pink-500 tracking-tighter leading-none">选择关卡</h1>
                                    <div className="text-[10px] text-slate-400 font-bold mt-2 uppercase tracking-widest">READY: {user.name}</div>
                                </div>
                                <button onClick={() => {localStorage.clear(); window.location.reload();}} className="p-3 bg-slate-800 rounded-2xl shadow-inner"><Icon d={PATHS.Settings} color="#64748b" size={18} /></button>
                            </div>
                            <div className="space-y-3 pb-10">
                                {SCENARIOS.map((s, i) => (
                                    <button key={s.id} onClick={() => startLevel(i)} className="w-full bg-slate-800/40 hover:bg-slate-800 p-5 rounded-[2rem] text-left border border-slate-700/50 hover:border-pink-500/50 transition-all flex items-center gap-4 group">
                                        <div className="w-10 h-10 bg-slate-700 rounded-2xl flex items-center justify-center font-black group-hover:bg-pink-600 group-hover:text-white transition-all text-slate-400">{i + 1}</div>
                                        <div className="flex-1 overflow-hidden">
                                            <div className="font-bold text-sm text-slate-200">{s.title}</div>
                                            <p className="text-[10px] text-slate-500 truncate mt-1 italic font-medium">“{s.context}”</p>
                                        </div>
                                        <Icon d={PATHS.ChevronRight} color="#475569" size={14} />
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* PLAYING */}
                    {gameState === 'PLAYING' && (
                        <div className="flex flex-1 flex-col h-full overflow-hidden fade-in">
                            <div className="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/80 backdrop-blur-md sticky top-0 z-10">
                                <button onClick={() => setGameState('MENU')} className="p-2 hover:bg-slate-800 rounded-full transition-colors"><Icon d={PATHS.ArrowLeft} color="#fff" size={18} /></button>
                                <div className="text-center">
                                    <div className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">{SCENARIOS[currentLevel].title}</div>
                                    <div className="text-xs font-mono text-pink-500 font-bold">ROUND: {turns}</div>
                                </div>
                                <div className="w-9"></div>
                            </div>
                            
                            <div className="px-4 py-3 bg-slate-800/20 border-b border-slate-800">
                                <div className="flex justify-between text-[9px] mb-1 font-black text-slate-500 uppercase tracking-widest"><span>Rage Level</span><span className={rage > 80 ? "text-red-500" : ""}>{rage}%</span></div>
                                <div className="h-1.5 bg-slate-800 rounded-full overflow-hidden p-[1px]">
                                    <div className={`h-full rounded-full transition-all duration-700 ${rage > 80 ? 'bg-red-600 shadow-[0_0_10px_red]' : 'bg-pink-600 shadow-[0_0_8px_pink]'}`} style={{width:`${rage}%`}}></div>
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto p-4 space-y-6 scrollbar-hide">
                                <div className="px-4 py-3 bg-slate-800/40 rounded-2xl border border-slate-700/50 text-[11px] text-slate-400 italic font-medium leading-relaxed">
                                    场景摘要: {SCENARIOS[currentLevel].context}
                                </div>
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in slide-in-from-bottom-2`}>
                                        <div className={`p-4 rounded-3xl text-[13px] leading-relaxed max-w-[88%] shadow-2xl ${
                                            m.role === 'user' 
                                            ? 'bg-indigo-600 text-white rounded-tr-none' 
                                            : 'bg-slate-800 border border-slate-700 text-slate-100 rounded-tl-none'
                                        }`}>
                                            {m.text}
                                        </div>
                                    </div>
                                ))}
                                {loading && <div className="text-center py-2 text-[10px] text-slate-600 font-black tracking-widest uppercase animate-pulse">仙女正在组织致命反击...</div>}
                                <div ref={scrollRef}></div>
                            </div>

                            <div className="p-4 border-t border-slate-800 bg-slate-900 pb-10 md:pb-6">
                                <div className="flex gap-2 bg-slate-800 rounded-[1.5rem] p-1.5 border border-slate-700 focus-within:border-pink-500 transition-all shadow-inner">
                                    <input className="flex-1 bg-transparent border-none px-4 py-2 text-sm outline-none placeholder:text-slate-600 text-slate-100" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSend()} placeholder="输入你的‘爹味’言论..."/>
                                    <button onClick={handleSend} disabled={loading} className="bg-pink-600 text-white p-3 rounded-2xl hover:bg-pink-500 active:scale-95 transition-all shadow-lg shadow-pink-600/20"><Icon d={PATHS.Send} color="#fff" size={18} /></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* RESULT */}
                    {gameState === 'RESULT' && (
                        <div className="p-10 flex-1 flex flex-col items-center justify-center text-center fade-in">
                            <div className="w-24 h-24 bg-red-600/10 text-red-600 border-2 border-red-600/20 rounded-[2.5rem] flex items-center justify-center mb-8 shadow-[0_0_50px_rgba(220,38,38,0.2)]">
                                <Icon d={PATHS.Skull} color="#ef4444" size={48} />
                            </div>
                            <h2 className="text-4xl font-black italic tracking-tighter text-red-600 mb-2">已被彻底拉黑</h2>
                            <div className="mb-10 space-y-1">
                                <div className="text-8xl font-black text-white tracking-tighter leading-none mb-1">{turns}</div>
                                <div className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Survived Rounds / 生存回合</div>
                            </div>
                            <button onClick={()=>setGameState('MENU')} className="w-full bg-white text-black py-5 rounded-3xl font-black hover:bg-slate-200 transition-all shadow-xl active:scale-95">回到对线大厅</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
