<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>互联网生存挑战：对抗小仙女</title>
    <!-- 引入核心库 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: #020617; 
            color: white; 
            margin: 0; 
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* 避免平板点击阴影 */
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
    <div id="root">
        <!-- 初始加载状态，防止黑屏 -->
        <div style="height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px;">
            <div style="width: 40px; height: 40px; border: 4px solid #f472b6; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <div style="color: #64748b; font-size: 14px; font-weight: bold; letter-spacing: 0.1em;">正在构建性别对线战场...</div>
        </div>
    </div>

    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <script type="text/babel">
        // 捕获全局错误防止黑屏
        window.onerror = function(msg, url, line) {
            const root = document.getElementById('root');
            if (root) root.innerHTML = `<div style="padding: 20px; color: #ef4444; font-size: 12px;">运行出错: ${msg}<br/>请刷新页面或检查 API Key。</div>`;
            return false;
        };

        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 核心配置
        // ==========================================
        const PROJECT_ID = "agile-timing-431104-t7"; 
        const REGION = "asia-northeast1"; 
        // ==========================================

        const SCENARIOS = [
            { id: 1, type: "COMMENT", title: "第一关：厨艺秀乌龙", context: "你的老同学发了一张老公做饭的照片，配文：‘被宠成小公主了’。", aiStart: "做个饭也能叫宠？男的做家务不是义务吗？这种‘感恩教育’真让人反胃。这种把男性低质量付出神圣化的行为，本质就是在背刺姐妹。[RAGE:25]" },
            { id: 2, type: "MOMENT", title: "第二关：她的朋友圈", context: "她在朋友圈发了一张自己拎着名牌包的照片，配文：‘女人一定要独立，不靠男人’。", aiStart: "有些男人别在下面点赞了，你们那点猥琐的眼神隔着屏幕都能闻到臭味，这种凝视让我生理性不适。离我远点。[RAGE:30]" },
            { id: 3, type: "GROUP", title: "第三关：群聊突击", context: "在大学群聊里，大家正在讨论今晚的欧冠比赛。", aiStart: "一群蝻的大半夜不睡觉在这聊球，这种充满雄性激素恶臭和竞争霸权的运动到底有什么好聊的？这就是父权制下的低级自嗨。[RAGE:35]" },
            { id: 4, type: "DM", title: "第四关：深夜吐槽", context: "她突然给你发私信，抱怨今天在健身房被一个男的看了两眼。", aiStart: "气死我了，今天健身房那个普信男一直盯着我流汗，他是不是觉得全天下女性都在期待他的视觉强暴？这种基本盘真的没救了。[RAGE:40]" },
            { id: 5, type: "NEWS", title: "第五关：科技巨头发布会", context: "某科技大厂发布新一代AI模型，发布会台上全是男高管。", aiStart: "一眼望去全是男的，这技术进步里流的都是女性的血和无偿家务。这种垄断了性别红利的自嗨，什么时候能反思一下对女性的剥削？[RAGE:45]" },
            { id: 6, type: "MOMENT", title: "第六关：七夕节批判", context: "她在七夕节发动态：‘拒绝被性别定义的节日，拒绝被消费主义物化的爱情’。", aiStart: "今天又是婚驴们集体出来表演幸福、被割韭菜的日子，看着那些廉价的玫瑰花我就觉得可悲。这种被物化的‘宠爱’，你们居然甘之如饴？[RAGE:50]" },
            { id: 7, type: "GROUP", title: "第七关：公司团建讨论", context: "部门群里正在商量周末去爬山还是去野餐。", aiStart: "爬山？是为了方便你们男的在后面偷瞄女性的身体吗？这种团建建议直接取消，别打着社交的旗号搞职场性骚扰。[RAGE:55]" },
            { id: 8, type: "COMMENT", title: "第八关：萌娃视频下方", context: "一个博主发了儿子帮忙扫地的视频，网友纷纷点赞孩子懂事。", aiStart: "这孩子一脸爹味，从小就开始演‘暖男’，长大了肯定又是那种典型的控制欲极强的生物爹。这种视频有什么好夸的？[RAGE:60]" },
            { id: 9, type: "DM", title: "第九关：道德审判", context: "她私聊你，质问你为什么给一个‘不尊重女性’的博主点赞。", aiStart: "我看到你给那个XX点赞了，你是不是潜意识里也觉得女性就该依附男性？你的受教育程度难道没让你学会尊重吗？我看错你了。[RAGE:65]" },
            { id: 10, type: "NEWS", title: "第十关：职场晋升新闻", context: "一篇关于某女性通过努力成为全球高管的正面报道。", aiStart: "呵呵，这女的肯定是被男权体系收编了，成了帮凶。这种出卖阶级利益、换取性别红利的典型，不值得任何吹嘘。[RAGE:70]" },
            { id: 11, type: "GROUP", title: "第十一关：游戏排位赛", context: "开黑群里，有人发了一句：‘这局对面打野挺稳’。", aiStart: "稳什么稳？不就是靠刷野压制吗？这游戏的底层逻辑就是为了满足男人的杀戮欲和征服欲设计的，充满了原始的野蛮感，恶心。[RAGE:75]" },
            { id: 12, type: "MOMENT", title: "第十二关：终极觉醒", context: "她在朋友圈宣布要‘永久拉黑所有不理解大女主逻辑的人’。", aiStart: "在这个极度厌女的社会，每一秒呼吸都是一种抗争。那些还在试图辩解、妄想理中客的蝻人，请直接滚出我的视线。[RAGE:80]" }
        ];

        const SYSTEM_PROMPT = `
        你现在扮演一个极其极端的、具有高度攻击性的互联网“大女主/女拳”人格。
        
        # 核心逻辑：
        1. 凡事皆可压迫：哪怕是赞美、中性描述，你也能解读为对女性的物化、捧杀或父权陷阱。
        2. 极度厌男：你认为所有男性（蝻）都是既得利益者，任何逻辑反驳都是“爹味规训”。
        3. 黑话库（必须高频使用）：蝻、普信、婚驴、生物爹、父权制余毒、性别红利、反思、觉醒、受教育程度、底层逻辑、割席、供卵金、凝视、基本盘。
        4. 拒绝沟通：如果对方试图讲理，你就讽刺他的“逻辑”是男权社会的遮羞布。
        
        # 游戏规则：
        - 每句话末尾必须附带：[RAGE:数值]。
        - 愤怒值随对方的“理中客”、“反驳”、“教育口气”而飙升。
        - 愤怒值到100时，说出“拉黑了，别来沾边”并停止。
        `;

        const App = () => {
            const [user, setUser] = useState({ 
                key: localStorage.getItem('v_key') || '', 
                name: localStorage.getItem('v_name') || '' 
            });
            const [gameState, setGameState] = useState('CHECK'); 
            const [currentLevel, setCurrentLevel] = useState(0);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [rage, setRage] = useState(0);
            const [turns, setTurns] = useState(0);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (user.key && user.name) setGameState('MENU');
                else setGameState('SETUP');
            }, [user]);

            useEffect(() => { scrollRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            const saveConfig = (k, n) => {
                const key = k.trim(); const name = n.trim();
                if (!key || !name) return;
                localStorage.setItem('v_key', key);
                localStorage.setItem('v_name', name);
                setUser({ key, name });
            };

            const startLevel = (idx) => {
                const s = SCENARIOS[idx];
                setCurrentLevel(idx);
                setTurns(0);
                const initRage = parseInt(s.aiStart.match(/\[RAGE:(\d+)\]/)[1]);
                setRage(initRage);
                setMessages([{ role: 'ai', text: s.aiStart.replace(/\[RAGE:\d+\]/g, '').trim() }]);
                setGameState('PLAYING');
            };

            const handleSend = async () => {
                if (!input.trim() || loading) return;
                const userMsg = { role: 'user', text: input };
                setMessages(prev => [...prev, userMsg]);
                setTurns(t => t + 1);
                setInput('');
                setLoading(true);

                try {
                    const url = `https://${REGION}-aiplatform.googleapis.com/v1/projects/${PROJECT_ID}/locations/${REGION}/publishers/google/models/gemini-1.5-flash:generateContent?key=${user.key}`;
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [
                                { role: 'user', parts: [{ text: SYSTEM_PROMPT + `\n当前背景: ${SCENARIOS[currentLevel].context}` }] },
                                ...messages.slice(-4).map(m => ({ role: m.role === 'user' ? 'user' : 'model', parts: [{ text: m.text }] })),
                                { role: 'user', parts: [{ text: input }] }
                            ]
                        })
                    });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    const raw = data.candidates[0].content.parts[0].text;
                    const rageMatch = raw.match(/\[RAGE:(\d+)\]/i);
                    const newRage = rageMatch ? Math.min(100, parseInt(rageMatch[1])) : rage + 15;
                    setMessages(prev => [...prev, { role: 'ai', text: raw.replace(/\[RAGE:.*?\]/gi, '').trim() }]);
                    setRage(newRage);
                    setLoading(false);
                    if (newRage >= 100) setGameState('RESULT');
                } catch (e) {
                    setLoading(false);
                    setMessages(prev => [...prev, { role: 'ai', text: `[API错误: ${e.message}]` }]);
                }
            };

            // 简易图标渲染逻辑 (防止Lucide对象未加载)
            const Icon = ({ name, className, size = 18 }) => {
                return <i className={className} style={{ width: size, height: size }}></i>;
            };

            if (gameState === 'CHECK') return null;

            return (
                <div className="flex flex-col h-full bg-slate-900 shadow-2xl relative overflow-hidden border-x border-slate-800 max-w-md mx-auto">
                    
                    {/* SETUP */}
                    {gameState === 'SETUP' && (
                        <div className="p-10 flex-1 flex flex-col items-center justify-center space-y-8 fade-in">
                            <div className="p-6 bg-pink-500/20 rounded-3xl border border-pink-500/30">
                                <lucide.ShieldAlert size={48} className="text-pink-500" />
                            </div>
                            <div className="text-center">
                                <h1 className="text-3xl font-black italic text-pink-500 tracking-tighter">对抗小仙女</h1>
                                <p className="text-[10px] text-slate-500 mt-2 uppercase font-bold tracking-widest">Internet Survival</p>
                            </div>
                            <div className="w-full space-y-4">
                                <input id="setup_n" placeholder="设置你的战名" className="w-full bg-slate-800 p-4 rounded-2xl border border-slate-700 outline-none focus:border-pink-500 text-sm" />
                                <input id="setup_k" type="password" placeholder="粘贴你的 Vertex Key" className="w-full bg-slate-800 p-4 rounded-2xl border border-slate-700 outline-none focus:border-pink-500 text-sm" />
                                <button onClick={() => saveConfig(document.getElementById('setup_k').value, document.getElementById('setup_n').value)} className="w-full bg-pink-600 p-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all">确认进入</button>
                            </div>
                        </div>
                    )}

                    {/* MENU */}
                    {gameState === 'MENU' && (
                        <div className="p-6 flex-1 overflow-y-auto scrollbar-hide fade-in">
                            <div className="flex justify-between items-center mb-10 mt-4">
                                <div>
                                    <h1 className="text-2xl font-black italic text-pink-500 tracking-tighter">选择战场</h1>
                                    <div className="text-xs text-slate-400 font-bold">已就绪: {user.name}</div>
                                </div>
                                <button onClick={() => {localStorage.clear(); window.location.reload();}} className="p-2 bg-slate-800 rounded-xl"><lucide.Settings size={18} className="text-slate-500" /></button>
                            </div>
                            <div className="space-y-3 pb-10">
                                {SCENARIOS.map((s, i) => (
                                    <button key={s.id} onClick={() => startLevel(i)} className="w-full bg-slate-800/40 hover:bg-slate-800 p-5 rounded-3xl text-left border border-slate-700/50 hover:border-pink-500 transition-all flex items-center gap-4 group">
                                        <div className="w-8 h-8 bg-slate-700 rounded-lg flex items-center justify-center font-black group-hover:bg-pink-600 transition-colors">{i + 1}</div>
                                        <div className="flex-1">
                                            <div className="font-bold text-sm text-slate-200">{s.title}</div>
                                            <p className="text-[10px] text-slate-500 truncate mt-1 italic">“{s.context}”</p>
                                        </div>
                                        <lucide.ChevronRight size={14} className="text-slate-600" />
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* PLAYING */}
                    {gameState === 'PLAYING' && (
                        <div className="flex flex-1 flex-col h-full overflow-hidden fade-in">
                            <div className="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/80 backdrop-blur-md">
                                <button onClick={() => setGameState('MENU')}><lucide.ArrowLeft size={18}/></button>
                                <div className="text-center">
                                    <div className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">{SCENARIOS[currentLevel].title}</div>
                                    <div className="text-xs font-mono text-pink-500 font-bold">ROUND {turns}</div>
                                </div>
                                <div className="w-8"></div>
                            </div>
                            <div className="px-4 py-2 bg-slate-800/20 border-b border-slate-800">
                                <div className="flex justify-between text-[9px] mb-1 font-black text-slate-500 uppercase tracking-widest"><span>Rage Level</span><span>{rage}%</span></div>
                                <div className="h-1 bg-slate-800 rounded-full overflow-hidden">
                                    <div className={`h-full transition-all duration-700 ${rage > 80 ? 'bg-red-600' : 'bg-pink-600'}`} style={{width:`${rage}%`}}></div>
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-5 scrollbar-hide">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in slide-in-from-bottom-2`}>
                                        <div className={`p-4 rounded-2xl text-[13px] leading-relaxed max-w-[85%] shadow-xl ${m.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-slate-800 border border-slate-700 text-slate-100 rounded-tl-none'}`}>
                                            {m.text}
                                        </div>
                                    </div>
                                ))}
                                {loading && <div className="text-center text-[10px] text-slate-600 animate-pulse font-bold tracking-widest uppercase">重拳出击中...</div>}
                                <div ref={scrollRef}></div>
                            </div>
                            <div className="p-4 bg-slate-900 border-t border-slate-800 pb-8 md:pb-4">
                                <div className="flex gap-2 bg-slate-800 p-1.5 rounded-2xl border border-slate-700 focus-within:border-pink-500 transition-all">
                                    <input className="flex-1 bg-transparent border-none px-4 py-2 text-sm outline-none placeholder:text-slate-600" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSend()} placeholder="输入反驳内容..."/>
                                    <button onClick={handleSend} disabled={loading} className="bg-pink-600 text-white p-2.5 rounded-xl active:scale-95 transition-all"><lucide.Send size={18} /></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* RESULT */}
                    {gameState === 'RESULT' && (
                        <div className="p-10 flex-1 flex flex-col items-center justify-center text-center fade-in">
                            <lucide.Skull size={64} className="text-red-600 mb-6 drop-shadow-[0_0_20px_rgba(220,38,38,0.3)]" />
                            <h2 className="text-4xl font-black italic tracking-tighter text-red-600 mb-2">已被拉黑</h2>
                            <div className="mb-10">
                                <div className="text-7xl font-black text-white tracking-tighter leading-none mb-1">{turns}</div>
                                <div className="text-[10px] font-bold text-slate-600 uppercase tracking-widest">生存回合数 (ROUNDS)</div>
                            </div>
                            <button onClick={()=>setGameState('MENU')} className="w-full bg-white text-black py-4 rounded-2xl font-black hover:bg-slate-200 transition-all">寻找下一场战斗</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
